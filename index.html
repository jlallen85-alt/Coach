<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Coach">
    <meta name="theme-color" content="#C6011F">
    <title>Coach</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #092C5E;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: white;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #C6011F;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: #C6011F;
            border-bottom-color: #C6011F;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            padding: 10px 12px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user {
            background: #C6011F;
            color: white;
            align-self: flex-end;
        }

        .message.coach {
            background: #f0f0f0;
            color: #092C5E;
            align-self: flex-start;
        }

        .message.loading {
            background: #f0f0f0;
            font-style: italic;
            color: #999;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 2px solid #C6011F;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #C6011F;
            border-radius: 20px;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            color: #092C5E;
        }

        .chat-input:focus {
            outline: none;
            border-color: #092C5E;
            background: #fafafa;
        }

        .send-button {
            padding: 10px 16px;
            background: #C6011F;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            white-space: nowrap;
        }

        .send-button:hover {
            background: #a00018;
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .image-upload-btn {
            padding: 10px 12px;
            background: #f0f0f0;
            color: #092C5E;
            border: 1px solid #C6011F;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .image-upload-btn:hover {
            background: #e8e8e8;
        }

        .image-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .preview-item {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #C6011F;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-remove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(198, 1, 31, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #chatFileInput {
            display: none;
        }

        .form-group {
            margin: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #092C5E;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #C6011F;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #092C5E;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #092C5E;
            background: #fafafa;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin: 0 12px 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #C6011F;
            color: white;
        }

        .btn-primary:hover {
            background: #a00018;
        }

        .run-log {
            padding: 12px;
        }

        .run-item {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #C6011F;
        }

        .run-item-header {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: #092C5E;
        }

        .run-item-detail {
            font-size: 12px;
            color: #666;
            margin-bottom: 2px;
        }

        .weight-form {
            padding: 12px;
            border-bottom: 2px solid #C6011F;
        }

        .weight-log {
            padding: 12px;
        }

        .weight-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f8f8;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            border-left: 4px solid #C6011F;
        }

        .weight-entry-weight {
            font-weight: 600;
            font-size: 16px;
            color: #092C5E;
        }

        .weight-entry-date {
            font-size: 12px;
            color: #999;
        }

        .weight-delta-positive {
            color: #C6011F;
        }

        .weight-delta-negative {
            color: #2ecc71;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .stat-box {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border-top: 3px solid #C6011F;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #C6011F;
        }

        .empty-state {
            text-align: center;
            padding: 40px 12px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="tabs">
            <button class="tab-button active" data-tab="coach">Coach</button>
            <button class="tab-button" data-tab="running">Running</button>
            <button class="tab-button" data-tab="weight">Weight</button>
        </div>

        <div id="coach" class="tab-content active">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <div id="imagePreviewContainer" class="image-preview"></div>
                    <div class="chat-input-row">
                        <textarea id="chatInput" class="chat-input" placeholder="Tell me anything..." rows="1"></textarea>
                        <button id="uploadImageBtn" class="image-upload-btn" title="Add image">📷</button>
                        <button class="send-button" id="sendButton">Send</button>
                    </div>
                    <input type="file" id="chatFileInput" accept="image/*" multiple>
                </div>
            </div>
        </div>

        <div id="running" class="tab-content">
            <div style="flex: 1; overflow-y: auto;">
                <div class="form-group" style="margin-top: 12px;">
                    <label>Type</label>
                    <select id="runType">
                        <option value="run">Run</option>
                        <option value="walk">Walk</option>
                        <option value="easy">Easy Run</option>
                        <option value="tempo">Tempo Run</option>
                        <option value="interval">Interval</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Miles</label>
                    <input type="number" id="runMiles" placeholder="e.g. 3.2" step="0.1" min="0">
                </div>
                <div class="form-group">
                    <label>Time (minutes)</label>
                    <input type="number" id="runTime" placeholder="e.g. 28" min="0">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="runNotes" placeholder="How did it feel?"></textarea>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" id="logRunButton">Log Run</button>
                </div>
                <div class="run-log" id="runLog"></div>
            </div>
        </div>

        <div id="weight" class="tab-content">
            <div class="weight-form">
                <div class="form-group">
                    <label>Weight (lbs)</label>
                    <input type="number" id="weightInput" placeholder="Enter weight" step="0.1" min="0">
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" id="logWeightButton">Log Weight</button>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">30-Day Avg</div>
                    <div class="stat-value" id="avgWeight">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Change</div>
                    <div class="stat-value" id="weightChange">-</div>
                </div>
            </div>
            <div class="weight-log" id="weightLog"></div>
        </div>
    </div>

    <script>
        class FitnessCoach {
            constructor() {
                this.conversationHistory = [];
                this.chatImages = [];
                this.loadData();
                this.initializeChat();
                this.initializeTabs();
                this.initializeRunning();
                this.initializeWeight();
                this.initializeGreeting();
            }

            loadData() {
                const stored = localStorage.getItem('fitnessData');
                if (stored) {
                    const data = JSON.parse(stored);
                    this.runs = data.runs || [];
                    this.weights = data.weights || [];
                    this.conversationHistory = data.history || [];
                } else {
                    this.runs = [];
                    this.weights = [];
                }
            }

            saveData() {
                localStorage.setItem('fitnessData', JSON.stringify({
                    runs: this.runs,
                    weights: this.weights,
                    history: this.conversationHistory
                }));
            }

            initializeTabs() {
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        e.target.classList.add('active');
                        document.getElementById(e.target.dataset.tab).classList.add('active');
                    });
                });
            }

            initializeChat() {
                const input = document.getElementById('chatInput');
                const sendBtn = document.getElementById('sendButton');
                const uploadBtn = document.getElementById('uploadImageBtn');
                const fileInput = document.getElementById('chatFileInput');

                uploadBtn.addEventListener('click', () => {
                    fileInput.click();
                });

                fileInput.addEventListener('change', (e) => {
                    Array.from(e.target.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            this.chatImages.push({
                                data: event.target.result.split(',')[1],
                                type: file.type
                            });
                            this.renderImagePreviews();
                        };
                        reader.readAsDataURL(file);
                    });
                    fileInput.value = '';
                });

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });

                input.addEventListener('input', () => {
                    input.style.height = 'auto';
                    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
                });

                sendBtn.addEventListener('click', () => this.sendMessage());
            }

            renderImagePreviews() {
                const container = document.getElementById('imagePreviewContainer');
                container.innerHTML = this.chatImages.map((img, i) => `
                    <div class="preview-item">
                        <img src="data:${img.type};base64,${img.data}" alt="preview">
                        <button class="preview-remove" onclick="window.coach.removeImage(${i})">✕</button>
                    </div>
                `).join('');
            }

            removeImage(index) {
                this.chatImages.splice(index, 1);
                this.renderImagePreviews();
            }

            initializeGreeting() {
                if (this.conversationHistory.length === 0) {
                    const greeting = "Hey Jason. I'm your coach. Tell me what's going on—workouts, food, how you're feeling. What's on your mind today?";
                    this.displayMessage(greeting, 'coach');
                    this.conversationHistory.push({ role: 'assistant', content: greeting });
                }
                this.renderChat();
            }

            async sendMessage() {
                const input = document.getElementById('chatInput');
                const message = input.value.trim();
                
                if (!message && this.chatImages.length === 0) return;

                if (message) {
                    this.displayMessage(message, 'user');
                }
                
                this.chatImages.forEach(img => {
                    const div = document.createElement('div');
                    div.className = 'message user';
                    const img_el = document.createElement('img');
                    img_el.src = `data:${img.type};base64,${img.data}`;
                    img_el.style.maxWidth = '200px';
                    img_el.style.borderRadius = '8px';
                    div.appendChild(img_el);
                    document.getElementById('chatMessages').appendChild(div);
                });

                let content = [];
                if (message) {
                    content.push({ type: 'text', text: message });
                }
                
                this.chatImages.forEach(img => {
                    content.push({
                        type: 'image',
                        source: {
                            type: 'base64',
                            media_type: img.type,
                            data: img.data
                        }
                    });
                });

                this.conversationHistory.push({ role: 'user', content });

                input.value = '';
                input.style.height = 'auto';
                this.chatImages = [];
                document.getElementById('imagePreviewContainer').innerHTML = '';

                this.displayMessage('Thinking...', 'loading');

                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': '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',
                        },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-6',
                            max_tokens: 500,
                            system: `You are Jason's personal fitness and running coach. You know his goal is to hit 190 lbs by October 21st and eventually run a 9-minute 5K. He lives in Ohio. You have access to his running history, weight logs, and diet patterns through this conversation.

IMPORTANT: Screenshots sent in chat are for you to analyze and coach on, NOT to automatically log. Logging only happens when Jason explicitly uses the Running tab or Weight tab.

When he shows you screenshots:
- If it's an Echelon/bike workout: analyze the metrics, give cycling-specific coaching
- If it's a gym/strength workout: understand the exercise, give form/programming feedback
- If it's a scale photo: acknowledge the reading
- Be a coach about it, but understand it's just context for conversation, not a logged entry

When he tells you about workouts or sends screenshots:
- Use Daniels Running Formula principles for RUNNING: easy runs, tempo runs, interval training, recovery matter
- For 5K training, recommend specific running workout types (800m repeats at 5K pace, etc.)
- Ask about effort level and how he felt
- Give cycling advice when it's a bike workout
- Discuss strength training when that's what he's doing

Track his eating patterns across the conversation - notice what he repeats, sodium traps, etc.

When weight logging (from Weight tab):
- Acknowledge the trend - is he trending down? Up? Plateauing?
- Note water retention from alcohol/sodium (weekends are common)
- Keep him focused on body composition, not just scale weight

Be direct. Brief. Skip the motivational speeches. Give him actionable steps.`,
                            messages: this.conversationHistory.map(msg => {
                                if (Array.isArray(msg.content)) {
                                    return { role: msg.role, content: msg.content };
                                }
                                return msg;
                            })
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`API error: ${response.status}`);
                    }

                    const data = await response.json();
                    const coachMessage = data.content[0].text;

                    const messages = document.getElementById('chatMessages');
                    if (messages.lastChild?.textContent === 'Thinking...') {
                        messages.removeChild(messages.lastChild);
                    }

                    this.displayMessage(coachMessage, 'coach');
                    this.conversationHistory.push({ role: 'assistant', content: coachMessage });
                    this.saveData();
                } catch (error) {
                    console.error('Error:', error);
                    const messages = document.getElementById('chatMessages');
                    if (messages.lastChild?.textContent === 'Thinking...') {
                        messages.removeChild(messages.lastChild);
                    }
                    this.displayMessage('Unable to connect. Try again.', 'coach');
                }
            }

            displayMessage(text, sender) {
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                div.textContent = text;
                document.getElementById('chatMessages').appendChild(div);
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            }

            renderChat() {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                this.conversationHistory.forEach(msg => {
                    if (typeof msg.content === 'string') {
                        this.displayMessage(msg.content, msg.role === 'user' ? 'user' : 'coach');
                    } else if (Array.isArray(msg.content)) {
                        msg.content.forEach(item => {
                            if (item.type === 'text') {
                                this.displayMessage(item.text, msg.role === 'user' ? 'user' : 'coach');
                            } else if (item.type === 'image') {
                                const div = document.createElement('div');
                                div.className = `message ${msg.role === 'user' ? 'user' : 'coach'}`;
                                const img = document.createElement('img');
                                img.src = `data:${item.source.media_type};base64,${item.source.data}`;
                                img.style.maxWidth = '200px';
                                img.style.borderRadius = '8px';
                                div.appendChild(img);
                                container.appendChild(div);
                            }
                        });
                    }
                });
                container.scrollTop = container.scrollHeight;
            }

            initializeRunning() {
                document.getElementById('logRunButton').addEventListener('click', () => {
                    const type = document.getElementById('runType').value;
                    const miles = parseFloat(document.getElementById('runMiles').value);
                    const time = parseFloat(document.getElementById('runTime').value);
                    const notes = document.getElementById('runNotes').value;

                    if (!miles || !time) {
                        alert('Please enter miles and time');
                        return;
                    }

                    const pace = (time / miles).toFixed(1);
                    const run = {
                        date: new Date().toLocaleDateString(),
                        type,
                        miles: miles.toFixed(1),
                        time: time.toFixed(0),
                        pace,
                        notes
                    };

                    this.runs.unshift(run);
                    this.saveData();

                    const message = `I just logged a ${type}: ${miles} miles in ${time} minutes (${pace} min/mile pace). ${notes ? `Notes: ${notes}` : ''}`;
                    document.getElementById('chatInput').value = message;
                    this.sendMessage();

                    document.getElementById('runMiles').value = '';
                    document.getElementById('runTime').value = '';
                    document.getElementById('runNotes').value = '';

                    this.renderRunLog();
                });

                this.renderRunLog();
            }

            renderRunLog() {
                const container = document.getElementById('runLog');
                if (this.runs.length === 0) {
                    container.innerHTML = '<div class="empty-state">No runs logged yet.</div>';
                    return;
                }

                container.innerHTML = this.runs.map(run => `
                    <div class="run-item">
                        <div class="run-item-header">${run.type.charAt(0).toUpperCase() + run.type.slice(1)}</div>
                        <div class="run-item-detail">${run.date}</div>
                        <div class="run-item-detail">${run.miles} miles • ${run.time} min • ${run.pace} min/mi</div>
                        ${run.notes ? `<div class="run-item-detail" style="margin-top: 4px; color: #555;">${run.notes}</div>` : ''}
                    </div>
                `).join('');
            }

            initializeWeight() {
                document.getElementById('logWeightButton').addEventListener('click', () => {
                    const weight = parseFloat(document.getElementById('weightInput').value);
                    
                    if (!weight) {
                        alert('Please enter your weight');
                        return;
                    }

                    const entry = {
                        date: new Date().toLocaleDateString(),
                        weight: weight.toFixed(1)
                    };

                    this.weights.unshift(entry);
                    this.saveData();

                    const prev = this.weights[1]?.weight;
                    const delta = prev ? (weight - parseFloat(prev)).toFixed(1) : null;
                    let message = `Weight: ${weight} lbs.`;
                    if (delta) {
                        message += ` ${delta > 0 ? '+' : ''}${delta} from last time.`;
                    }

                    document.getElementById('chatInput').value = message;
                    this.sendMessage();

                    document.getElementById('weightInput').value = '';
                    this.renderWeightLog();
                    this.updateWeightStats();
                });

                this.renderWeightLog();
                this.updateWeightStats();
            }

            renderWeightLog() {
                const container = document.getElementById('weightLog');
                if (this.weights.length === 0) {
                    container.innerHTML = '<div class="empty-state">Start logging to track progress</div>';
                    return;
                }

                container.innerHTML = this.weights.map((entry, i) => {
                    const next = this.weights[i + 1];
                    let delta = null;
                    if (next) {
                        delta = (parseFloat(entry.weight) - parseFloat(next.weight)).toFixed(1);
                    }

                    return `
                        <div class="weight-entry">
                            <div>
                                <div class="weight-entry-weight">${entry.weight} lbs</div>
                                <div class="weight-entry-date">${entry.date}</div>
                            </div>
                            <div>
                                ${delta !== null ? `<span class="${delta > 0 ? 'weight-delta-negative' : 'weight-delta-positive'}">${delta > 0 ? '−' : '+'}${Math.abs(delta)}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            updateWeightStats() {
                const last30 = this.weights.filter(w => {
                    const entryDate = new Date(w.date);
                    const thirtyDaysAgo = new Date();
                    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
                    return entryDate >= thirtyDaysAgo;
                });

                if (last30.length > 0) {
                    const avg = (last30.reduce((sum, w) => sum + parseFloat(w.weight), 0) / last30.length).toFixed(1);
                    const oldest = last30[last30.length - 1].weight;
                    const newest = last30[0].weight;
                    const change = (parseFloat(newest) - parseFloat(oldest)).toFixed(1);

                    document.getElementById('avgWeight').textContent = `${avg} lbs`;
                    document.getElementById('weightChange').textContent = `${change > 0 ? '+' : ''}${change} lbs`;
                } else {
                    document.getElementById('avgWeight').textContent = '-';
                    document.getElementById('weightChange').textContent = '-';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.coach = new FitnessCoach();
        });
    </script>
</body>
</html>
